# Cloud Build pipeline — STAGING
#
# Trigger: push em branch `staging`.
# Diferenca em relacao a producao:
#   - Service Cloud Run separado: `desk-staging`
#   - Sem --no-traffic (deploy direto, ambiente isolado)
#   - Min-instances=0 (escala a zero, custo perto de zero quando ocioso)
#   - Secret de Supabase pode ser o mesmo projeto Pro ou um staging dedicado

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--build-arg=VITE_SUPABASE_URL=$$VITE_SUPABASE_URL'
      - '--build-arg=VITE_SUPABASE_PUBLISHABLE_KEY=$$VITE_SUPABASE_ANON_KEY'
      - '--build-arg=VITE_SENTRY_DSN=$$VITE_SENTRY_DSN'
      - '--build-arg=VITE_APP_VERSION=staging-$SHORT_SHA'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app-staging:$SHORT_SHA'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app-staging:latest'
      - '--target=production'
      - '.'
    secretEnv: ['VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY', 'VITE_SENTRY_DSN']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app-staging']
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'desk-staging'
      - '--image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app-staging:$SHORT_SHA'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=ENVIRONMENT=staging'
    waitFor: ['push']

availableSecrets:
  secretManager:
    # Usar secrets compartilhados ou criar versoes -staging dedicadas.
    - versionName: projects/$PROJECT_ID/secrets/supabase-url-staging/versions/latest
      env: 'VITE_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/supabase-anon-key-staging/versions/latest
      env: 'VITE_SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/sentry-dsn/versions/latest
      env: 'VITE_SENTRY_DSN'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '900s'

images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app-staging:$SHORT_SHA'
