name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck nao-bloqueante hoje: os types em src/lib/supabase/types.ts
      # estao defasados em relacao as migrations recentes (service_plans,
      # workflows novos, ticket_timeline NOTIFICATION). Antes de tornar
      # bloqueante, rodar:
      #   supabase gen types typescript --project-id <id> > src/lib/supabase/types.ts
      - name: Typecheck (non-blocking)
        run: npm run typecheck
        continue-on-error: true

      - name: Build (dummy envs)
        env:
          # Vite congela envs em build time. No CI usamos placeholders só pra
          # validar que o bundle compila. Os valores reais vivem no Secret
          # Manager e entram via build-arg no Cloud Build.
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key
        run: npm run build

  e2e:
    name: Smoke E2E (Playwright)
    runs-on: ubuntu-latest
    needs: validate
    # Roda apenas em push para staging (canario antes de promover para main).
    # PRs nao rodam para nao bloquear iteracao rapida e nao gastar minutos.
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke
        env:
          E2E_BASE_URL: https://staging-desk.antrop-ia.com
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
