# Cloud Build pipeline — PRODUCAO
#
# Trigger: push em main (configurado via `gcloud builds triggers create github`).
# Resultado: nova revisao no Cloud Run com --no-traffic. Promocao para
# producao e MANUAL via `gcloud run services update-traffic` (canary).
#
# Pre-requisitos rodados uma vez no projeto GCP (ver pllano de melhorias.md):
#   - APIs habilitadas (run, cloudbuild, artifactregistry, secretmanager)
#   - Artifact Registry `desk` em southamerica-east1
#   - Secrets criados: supabase-url, supabase-anon-key, sentry-dsn
#   - SA Cloud Build com roles: run.admin, iam.serviceAccountUser,
#     secretmanager.secretAccessor, artifactregistry.writer

steps:
  # 1. Build da imagem Docker com build args injetados do Secret Manager.
  #    Vite congela env vars em build time, entao precisam estar AQUI, nao no
  #    --set-env-vars do Cloud Run.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--build-arg=VITE_SUPABASE_URL=$$VITE_SUPABASE_URL'
      - '--build-arg=VITE_SUPABASE_PUBLISHABLE_KEY=$$VITE_SUPABASE_ANON_KEY'
      - '--build-arg=VITE_SENTRY_DSN=$$VITE_SENTRY_DSN'
      - '--build-arg=VITE_APP_VERSION=$SHORT_SHA'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app:$SHORT_SHA'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app:latest'
      - '--target=production'
      - '.'
    secretEnv: ['VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY', 'VITE_SENTRY_DSN']

  # 2. Push pro Artifact Registry (ambas as tags).
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app']
    waitFor: ['build']

  # 3. Deploy Cloud Run COM --no-traffic (canary manual posterior).
  #    Min-instances=1 evita cold start em horario comercial.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'desk'
      - '--image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app:$SHORT_SHA'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--no-traffic'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--set-env-vars=ENVIRONMENT=production'
      - '--tag=sha-$SHORT_SHA'
    waitFor: ['push']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/supabase-url/versions/latest
      env: 'VITE_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/supabase-anon-key/versions/latest
      env: 'VITE_SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/sentry-dsn/versions/latest
      env: 'VITE_SENTRY_DSN'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '900s'

# Imagens publicadas (referencia para `gcloud run services update-traffic`).
images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app:$SHORT_SHA'
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/desk/app:latest'
